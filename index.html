<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ القنابل النووية 💣 للثانوية العامة</title>
    <style>
        :root {
            --bg: #f0f2f5;
            --card: rgba(255, 255, 255, 0.8);
            --text: #2d3436;
            --accent: #ff4e00;
            --shadow: rgba(0,0,0,0.1);
            --border: rgba(0, 0, 0, 0.05);
        }
        [data-theme="dark"] {
            --bg: #0f0f0f;
            --card: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
            --shadow: rgba(255, 78, 0, 0.2);
            --border: rgba(255, 255, 255, 0.1);
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; transition: all 0.4s ease; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .theme-switch { position: fixed; top: 20px; left: 20px; cursor: pointer; background: var(--accent); color: white; border: none; padding: 12px 20px; border-radius: 50px; font-weight: bold; box-shadow: 0 5px 15px var(--shadow); z-index: 1000; }
        header { margin: 60px 0 30px; text-align: center; }
        header h1 { font-size: 3.2rem; font-weight: 900; color: var(--accent); text-shadow: 2px 2px 10px rgba(0,0,0,0.3); margin-bottom: 5px; }
        header .sub-title { font-size: 1.8rem; font-weight: bold; color: var(--text); display: block; margin-top: 10px; }
        .header-custom-btns { margin-top: 15px; display: flex; gap: 10px; justify-content: center; align-items: center; flex-wrap: wrap; }
        .tg-custom-btn { background-color: #0088cc; color: white; padding: 6px 14px; border-radius: 12px; text-decoration: none; font-size: 0.85rem; font-weight: bold; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; width: 90%; max-width: 1100px; padding-bottom: 50px; }
        .bomb-card { background: var(--card); backdrop-filter: blur(15px); border: 1px solid var(--border); border-radius: 25px; padding: 40px 20px; text-align: center; position: relative; box-shadow: 0 10px 20px var(--shadow); }
        .models-btn { display: block; margin: 12px auto 0; padding: 8px 15px; background-color: var(--accent); color: white; text-decoration: none; border-radius: 15px; font-size: 0.9rem; font-weight: bold; z-index: 10; width: 85%; }
        .arabic { border-bottom: 6px solid #ff9f43; }.physics { border-bottom: 6px solid #3498db; }.chemistry { border-bottom: 6px solid #2ecc71; }.math { border-bottom: 6px solid #ee5253; }.history { border-bottom: 6px solid #f1c40f; }.geography { border-bottom: 6px solid #00d2d3; }
    </style>
</head>
<body>

    <button class="theme-switch" onclick="toggleTheme()">تغيير الوضع 🌙</button>

    <header>
        <h1>⚡ القنابل النووية 💣</h1>
        <span class="sub-title">للثانوية العامة</span>
        <div class="header-custom-btns">
            <a href="https://t.me/Apps4Users" target="_blank" class="tg-custom-btn">📢 قناة التليجرام</a>
        </div>
    </header>

    <div class="grid-container">
        <div class="bomb-card arabic">
            <i>📖</i>
            <h2>قنابل العربية</h2>
            <a href="https://sanwia3ama-revisions-exams.github.io/-2026/" target="_blank" class="models-btn">مراجعة النحو شامل</a>
            <a href="https://sanwia3ama-revisions-exams.github.io/arabic2026/" target="_blank" class="models-btn">اسئلة و اجابة النماذج الاسترشادية</a>
        </div>
        <div class="bomb-card physics" onclick="fetchData('physics', 'https://raw.githubusercontent.com/username/repo/main/physics.json')"><i>⚡</i><h2>قنابل الفيزياء</h2></div>
        <div class="bomb-card chemistry" onclick="fetchData('chemistry', 'https://raw.githubusercontent.com/username/repo/main/chemistry.json')"><i>🧪</i><h2>قنابل الكيمياء</h2></div>
        <div class="bomb-card math" onclick="fetchData('math', 'https://raw.githubusercontent.com/username/repo/main/math.json')"><i>📐</i><h2>قنابل الرياضيات</h2></div>
        <div class="bomb-card history" onclick="fetchData('history', 'https://raw.githubusercontent.com/username/repo/main/history.json')"><i>🏛️</i><h2>قنابل التاريخ</h2></div>
        <div class="bomb-card geography" onclick="fetchData('geography', 'https://raw.githubusercontent.com/username/repo/main/geography.json')"><i>🌍</i><h2>قنابل الجغرافيا</h2></div>
    </div>

    <script>
        function fetchData(subjectName, url) {
            // ملاحظة: الروابط أدناه وهمية، يجب استبدالها بروابط حقيقية
            window.open(url, '_blank');
        }

        function toggleTheme() {
            const body = document.body;
            const btn = document.querySelector('.theme-switch');
            if (body.getAttribute('data-theme') === 'dark') { body.removeAttribute('data-theme'); btn.innerText = 'تغيير الوضع 🌙'; }
            else { body.setAttribute('data-theme', 'dark'); btn.innerText = 'تغيير الوضع ☀️'; }
        }
    </script>
</body>
</html>
